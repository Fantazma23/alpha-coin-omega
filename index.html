<!DOCTYPE html>
<html>
<head>
    <title>Alpha Omega Coin | Sacred Geometry DeFi Protocol</title>
    <style>
        body { 
            background: #0a0e27; 
            color: #FFD700; 
            font-family: Arial; 
            text-align: center; 
            padding-top: 100px;
            margin: 0;
            overflow: hidden;
        }
        #sacred-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }
        button { 
            background: linear-gradient(135deg, #B8860B, #FFD700); 
            color: black; 
            padding: 15px 30px; 
            border: none; 
            font-size: 18px; 
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .card {
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <canvas id="sacred-bg"></canvas>

    <h1 style="font-size: 3em; text-shadow: 0 0 20px rgba(255,215,0,0.5);">ALPHA Ω</h1>
    <p>Alpha Omega Coin (AOC) - Powered by Sacred Geometry</p>
    
    <div class="card">
        <p>Token Price: <strong>$1.89</strong></p>
        <p>Holders: <strong>1,234</strong></p>
    </div>

    <button onclick="connectWallet()">CONNECT WALLET</button>

    <script>
        const canvas = document.getElementById('sacred-bg');
        const ctx = canvas.getContext('2d');
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.005;
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 + time;
                const x = cx + Math.cos(angle) * 100;
                const y = cy + Math.sin(angle) * 100;
                
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
                ctx.lineWidth = 2;
                ctx.arc(x, y, 100, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(cx, cy, 100, 0, Math.PI * 2);
            ctx.stroke();

            requestAnimationFrame(draw);
        }
        draw();

        function connectWallet() {
            alert('🔮 Sacred Wallet Connection\n\nComing in next step!');
        }
    </script>

</body>
</html>
